name: Proof of Independence
on: [push, workflow_dispatch]
jobs:
  verify-independence:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Clean Room Verification (No C, No Python)
      run: |
        echo "Checking environment for external dependencies..."
        if find . -name "*.c" | grep -q .; then echo "❌ FAILED: C source code found!"; exit 1; fi
        if find . -name "*.py" | grep -q .; then echo "❌ FAILED: Python script found!"; exit 1; fi
        echo "✅ Clean Room Confirmed: 0% C, 0% Python. Pure environment."

    - name: 2. Execute Spaces-generated Native ELF
      run: |
        echo "Granting execution rights to the ELF binary..."
        chmod +x loop_test.elf
        
        echo "Executing the binary directly on the Ubuntu Linux kernel..."
        ./loop_test.elf > output.txt
        
        echo "--- Execution Output ---"
        cat output.txt
        echo ""
        echo "------------------------"

    - name: 3. Validate Final Result
      run: |
        if grep -q "B" output.txt; then
          echo "🎉 PERFECT INDEPENDENCE: The ELF runs natively!"
          echo "The Spaces compiler's output is fully autonomous."
        else
          echo "❌ FAILED: Unexpected output."
          exit 1
        fi
